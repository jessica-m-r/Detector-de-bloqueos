services:
  - type: web
    name: deteccion-bloqueos
    env: python
    plan: free
    buildCommand: >
      pip install --no-cache-dir --index-url https://download.pytorch.org/whl/cpu "torch>=2.5.0,<2.8.0" "torchvision>=0.20.0,<0.23.0" &&
      pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT